<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerar Ícones</title>
</head>
<body style="background:#222;color:white;text-align:center;font-family:sans-serif">

<h2>Gerador de Ícones - Estoque</h2>
<button onclick="gerar(192)">Gerar 192x192</button>
<button onclick="gerar(512)">Gerar 512x512</button>
<br><br>
<canvas id="canvas"></canvas>
<br><br>
<a id="download" style="color:lime;font-size:18px;"></a>

<script>
function gerar(tamanho){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = tamanho;
  canvas.height = tamanho;

  // Fundo azul
  ctx.fillStyle = "#2563eb";
  ctx.fillRect(0, 0, tamanho, tamanho);

  // Letra E
  ctx.fillStyle = "white";
  ctx.font = "bold " + (tamanho * 0.5) + "px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("E", tamanho/2, tamanho/2);

  const link = document.getElementById("download");
  link.href = canvas.toDataURL("image/png");
  link.download = "icon-" + tamanho + ".png";
  link.textContent = "Clique aqui para baixar icon-" + tamanho + ".png";
}
</script>

</body>
</html>
